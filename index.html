<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title data-bind="META.TITLE"></title>
    <meta name="description" content="예식일 : 05월09일 토요일 오전 11시00분" />
    <meta data-bind="META.KEYWORDS" data-bind-attr="content" name="keywords" />

    <!-- 파비콘 -->
    <link
      rel="icon"
      type="image/png"
      href="https://lh3.googleusercontent.com/d/1uCWUkVDDsvcbTDC_p_ZIZLqaQNm6gdhM"
      sizes="196x196"
    />

    <!-- 오픈 그래프 -->
    <meta property="og:title" content="이승현과 진가영 결혼합니다." />
    <meta
      property="og:description"
      content="예식일 : 05월09일 토요일 오전 11시00분"
    />
    <meta
      property="og:image"
      content="https://lh3.googleusercontent.com/d/1j0E_Wm13LrMmPUb1QYdRyQl10AG36CxD"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="627" />

    <!-- 네이버 지도 API -->
    <script
      type="text/javascript"
      src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=8d50jglw6g"
    ></script>

    <!-- 카카오톡 공유하기 -->
    <script
      src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"
      integrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p"
      crossorigin="anonymous"
    ></script>

    <!-- 글꼴 / 스타일 -->
    <link rel="stylesheet" as="style" href="/index.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
  </head>

  <body>
    <!-- 메인 이미지 -->
    <div class="main-image">
      <button
        class="bgm-button"
        id="bgmButton"
        type="button"
        onclick="playAudio()"
      >
        <!-- 재생 -->
        <svg
          class="bgm-icon bgm-icon-play"
          width="18px"
          height="18px"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          color="#FFF"
        >
          <path
            d="M1 13.8571V10.1429C1 9.03829 1.89543 8.14286 3 8.14286H5.9C6.09569 8.14286 6.28708 8.08544 6.45046 7.97772L12.4495 4.02228C13.1144 3.5839 14 4.06075 14 4.85714V19.1429C14 19.9392 13.1144 20.4161 12.4495 19.9777L6.45046 16.0223C6.28708 15.9146 6.09569 15.8571 5.9 15.8571H3C1.89543 15.8571 1 14.9617 1 13.8571Z"
            stroke="#FFF"
            stroke-width="1.5"
          ></path>
          <path
            d="M17.5 7.5C17.5 7.5 19 9 19 11.5C19 14 17.5 15.5 17.5 15.5"
            stroke="#FFF"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M20.5 4.5C20.5 4.5 23 7 23 11.5C23 16 20.5 18.5 20.5 18.5"
            stroke="#FFF"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </svg>

        <!-- 정지 -->
        <svg
          class="bgm-icon bgm-icon-stop is-hidden"
          width="18px"
          height="18px"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          color="#FFF"
        >
          <path
            d="M18 14L20.0005 12M22 10L20.0005 12M20.0005 12L18 10M20.0005 12L22 14"
            stroke="#FFF"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
          <path
            d="M2 13.8571V10.1429C2 9.03829 2.89543 8.14286 4 8.14286H6.9C7.09569 8.14286 7.28708 8.08544 7.45046 7.97772L13.4495 4.02228C14.1144 3.5839 15 4.06075 15 4.85714V19.1429C15 19.9392 14.1144 20.4161 13.4495 19.9777L7.45046 16.0223C7.28708 15.9146 7.09569 15.8571 6.9 15.8571H4C2.89543 15.8571 2 14.9617 2 13.8571Z"
            stroke="#FFF"
            stroke-width="1.5"
          ></path>
        </svg>
      </button>

      <audio
        id="bgm"
        src="/assets/bgm.mp3"
        autoplay=""
        loop=""
        preload="auto"
      ></audio>

      <img src="/assets/images/img_main.png" alt="메인 이미지" />
    </div>

    <!-- SAVE THE DATE 이미지 -->
    <div class="image" style="margin: 80px 0 10px">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 1876 727"
        aria-label="WEDDING DAY"
        style="height: 50px; color: var(--main-color)"
      >
        <g class="svg-main" transform="translate(-23 -45)">
          <ellipse
            cx="938"
            cy="363.5"
            rx="938"
            ry="363.5"
            transform="translate(23 45)"
            fill="#000"
          />

          <g
            transform="translate(100 98)"
            fill="none"
            stroke="currentColor"
            stroke-width="10"
          >
            <ellipse cx="860.5" cy="310.5" rx="860.5" ry="310.5" />
            <ellipse cx="860.5" cy="310.5" rx="855.5" ry="305.5" />
          </g>

          <text
            x="51%"
            y="50%"
            font-size="160"
            font-family="MapoAgap"
            fill="currentColor"
            stroke="currentColor"
            text-anchor="middle"
            dominant-baseline="middle"
            dy="0.35em"
          >
            WEDDING DAY
          </text>
        </g>
      </svg>
    </div>

    <!-- 날짜 및 장소 -->
    <div class="wedding-info">
      <p data-bind="WEDDING.DATE.TEXT"></p>
      <p data-bind="WEDDING.PLACE"></p>
      <p data-bind="WEDDING.ADDRESS"></p>
    </div>

    <!-- 손글씨 이미지 -->
    <div class="image" style="margin-bottom: 55px">
      <img
        alt="손글씨 이미지"
        style="width: 80%"
        src="/assets/images/img_handwrite.png"
      />
    </div>

    <!-- 편지지 이미지 -->
    <div class="image" style="margin-bottom: 70px">
      <div class="envelope-container">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 336 203"
          class="envelope-base"
        >
          <rect
            class="env-col"
            x="15.19"
            y="15.12"
            width="305.12"
            height="172.78"
          />
        </svg>

        <svg
          class="drop-shadow"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 337 204"
        >
          <path
            class="env-cls-3"
            d="M321.5,15.4c-7.32,1.46-16.37,2.43-23.27,4.86-6.89,2.43-14.65,6.32-21.54,10.21-6.89,3.89-71.52,45.2-76.26,48.12-4.74,2.92-11.45,6.56-11.45,14.1,0,7.53,1.54,11.9,9.3,17.49,7.76,5.59,74.54,60.27,84.45,64.88,9.91,4.62,14.22,6.08,19.39,7.78,5.17,1.7,19.39,5.35,19.39,5.35V15.4Z"
          />
        </svg>

        <svg
          class="drop-shadow"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 337 204"
        >
          <path
            class="env-cls-2"
            d="M15.95,15.4c7.32,1.46,16.37,2.43,23.27,4.86,6.89,2.43,14.65,6.32,21.54,10.21,6.89,3.89,71.52,45.2,76.26,48.12,4.74,2.92,11.45,6.56,11.45,14.1s-1.54,11.9-9.3,17.49c-7.76,5.59-74.54,60.27-84.45,64.88-9.91,4.62-14.22,6.08-19.39,7.78-5.17,1.7-19.39,5.35-19.39,5.35V15.4Z"
          />
        </svg>

        <svg
          class="drop-shadow"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 337 204"
        >
          <path
            class="env-cls-4"
            d="M16.01,188.18s2.62-10.79,5.24-14.07c2.62-3.28,10.04-9.62,14.4-12.67,4.36-3.05,85.97-63.81,88.15-65.92s6.98-4.46,11.78-4.46h33.17s28.37,0,33.17,0,9.6,2.35,11.78,4.46c2.18,2.11,83.79,62.87,88.15,65.92s11.78,9.38,14.4,12.67c2.62,3.28,5.24,14.07,5.24,14.07H16.01Z"
          />
        </svg>

        <svg
          class="drop-shadow"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 337 129"
        >
          <path
            class="env-col"
            d="M315.56,31.71c-7.51,4.88-106.35,67.51-114.69,72.68s-15.01,8.62-32.11,8.62-23.77-3.45-32.11-8.62c-8.34-5.17-107.19-67.8-114.69-72.68-7.51-4.88-5.84-9.77-5.84-15.8h305.3c0,6.03,1.67,10.92-5.84,15.8Z"
          />
        </svg>

        <div class="envelope-text">
          <span>2026.05.09 SAT</span>
          <span>11:00 AM</span>
        </div>
      </div>
    </div>

    <!-- 신랑신부 정보 -->
    <div class="couple-info">
      <div class="person">
        <strong>Groom</strong>
        <p data-bind="COUPLE.GROOM"></p>
      </div>
      <div class="person">
        <strong>Bride</strong>
        <p data-bind="COUPLE.BRIDE"></p>
      </div>
    </div>

    <!-- 부모님 정보 -->
    <div class="parents-info">
      <div class="parent-section">
        <strong>Groom's Parents</strong>

        <img alt="신랑 부모님" src="/assets/images/img_parents1.png" />
      </div>
      <div class="parent-section" style="margin-top: 70px">
        <strong>Bride's Parents</strong>

        <img alt="신부 부모님" src="/assets/images/img_parents2.png" />
      </div>
    </div>

    <!-- 신랑신부 정보2 -->
    <div class="couple-info2">
      <div class="image" style="position: relative">
        <img alt="신랑신부 이미지" src="/assets/images/img_couple3.jpeg" />
        <img
          alt="신랑신부 이미지"
          src="/assets/images/img_couple3_hand.png"
          style="
            position: absolute;
            width: 65%;
            top: 65px;
            left: 24px;
            transform: rotate(-5deg);
          "
        />
      </div>
      <div class="image" style="position: relative; margin-top: 40px">
        <img alt="신랑신부 이미지" src="/assets/images/img_couple2.jpeg" />
        <img
          alt="신랑신부 이미지"
          src="/assets/images/img_couple2_hand.png"
          style="
            position: absolute;
            width: 70%;
            top: 40px;
            right: 15px;
            transform: rotate(8deg);
          "
        />
      </div>
    </div>

    <!-- 갤러리 -->
    <div class="gallery">
      <div class="gallery-grid" id="galleryPreview"></div>
      <button class="gallery-more-btn" id="galleryMoreBtn" type="button">
        더보기
      </button>
    </div>

    <!-- 달력 -->
    <div class="calendar">
      <div class="calendar-header">
        <div class="calendar-date" id="calendarDate"></div>
        <div class="calendar-time" id="calendarTime"></div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="calendar-dday" id="calendarDday"></div>
    </div>

    <!-- 안내사항 -->
    <div
      class="notice-tab-wrap padding"
      style="padding-left: 40px; padding-right: 40px"
    >
      <div class="image" style="margin: 5px 0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 1876 727"
          aria-label="안내사항"
          style="height: 50px; color: #fff"
        >
          <g class="svg-main" transform="translate(-23 -45)">
            <ellipse
              cx="938"
              cy="363.5"
              rx="938"
              ry="363.5"
              transform="translate(23 45)"
              fill="var(--main-color)"
            ></ellipse>

            <g
              transform="translate(100 98)"
              fill="none"
              stroke="currentColor"
              stroke-width="10"
            >
              <ellipse cx="860.5" cy="310.5" rx="860.5" ry="310.5"></ellipse>
              <ellipse cx="860.5" cy="310.5" rx="855.5" ry="305.5"></ellipse>
            </g>

            <text
              x="52%"
              y="50%"
              font-size="215"
              font-family="Pretendard"
              fill="currentColor"
              stroke="currentColor"
              text-anchor="middle"
              dominant-baseline="middle"
              dy="0.35em"
            >
              피로연 안내
            </text>
          </g>
        </svg>
      </div>
      <div class="notice-tabs" id="noticeTabs">
        <!-- <button type="button" class="notice-tab-btn active">
          💍 피로연 안내
        </button> -->
        <!-- <button type="button" class="notice-tab-btn">🍽️ 식사안내</button> -->
        <!-- <button type="button" class="notice-tab-btn">🅿️ 주차안내</button> -->
      </div>
      <div class="notice-content" id="noticeContent">
        <div class="notice-content-text">
          예식 참석이 어려운 분들을 위해<br />
          혼례에 앞서 피로연 자리를 마련하였습니다.<br /><br />
          <strong>혼주</strong> 진광석 · 김경미<br /><br />

          <strong>
            2026년 05월 02일 토요일 오전 11시<br />
            철원 태봉 웨딩홀<br />
          </strong>
          강원 철원군 서면 와수로 110번안길 18-2
        </div>
      </div>
    </div>

    <!-- 지도 -->
    <div class="map-section">
      <div class="image" style="margin: 5px 0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 1876 727"
          aria-label="오시는 길"
          style="height: 50px; color: #fff"
        >
          <g class="svg-main" transform="translate(-23 -45)">
            <ellipse
              cx="938"
              cy="363.5"
              rx="938"
              ry="363.5"
              transform="translate(23 45)"
              fill="var(--main-color)"
            />

            <g
              transform="translate(100 98)"
              fill="none"
              stroke="currentColor"
              stroke-width="10"
            >
              <ellipse cx="860.5" cy="310.5" rx="860.5" ry="310.5" />
              <ellipse cx="860.5" cy="310.5" rx="855.5" ry="305.5" />
            </g>

            <text
              x="52%"
              y="50%"
              font-size="215"
              font-family="Pretendard"
              fill="currentColor"
              stroke="currentColor"
              text-anchor="middle"
              dominant-baseline="middle"
              dy="0.35em"
            >
              오시는 길
            </text>
          </g>
        </svg>
      </div>

      <div class="map-container" id="map"></div>

      <div class="location-info">
        <span style="margin: 10px 0; display: inline-block">
          <p data-bind="WEDDING.ADDRESS"></p>
          <p data-bind="WEDDING.PLACE" style="font-weight: bold"></p>
        </span>
        <button class="copy-btn" onclick="copyAddress()">복사하기</button>
      </div>
      <div class="location-nav-buttons">
        <button class="location-nav-btn" onclick="openNaverMap()">
          <img src="/assets/icon_navermap.png" />
          <span>네이버 지도</span>
        </button>
        <button class="location-nav-btn" onclick="openKakaoNavi()">
          <img src="/assets/icon_kakaonavi.png" />
          <span>카카오 네비</span>
        </button>
        <button class="location-nav-btn" onclick="openTmap()">
          <img src="/assets/icon_tmap.png" /> <span>티맵</span>
        </button>
      </div>

      <div style="margin-top: 10px; padding: 0 20px">
        <div class="divider"></div>
      </div>

      <div class="transportation">
        <strong>🚎 버스</strong>
        <span data-bind="TRANSPORT.BUS"></span>

        <strong>🚊 지하철</strong>
        <span data-bind="TRANSPORT.SUBWAY"></span>

        <strong>🚖 자차</strong>
        <span data-bind="TRANSPORT.EXPRESS"></span>
      </div>
    </div>

    <!-- 계좌번호 -->
    <div class="account">
      <div class="image" style="margin: 5px 0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 1876 727"
          aria-label="마음 전하실 곳"
          style="height: 50px; color: #fff"
        >
          <g class="svg-main" transform="translate(-23 -45)">
            <ellipse
              cx="938"
              cy="363.5"
              rx="938"
              ry="363.5"
              transform="translate(23 45)"
              fill="var(--main-color)"
            />

            <g
              transform="translate(100 98)"
              fill="none"
              stroke="currentColor"
              stroke-width="10"
            >
              <ellipse cx="860.5" cy="310.5" rx="860.5" ry="310.5" />
              <ellipse cx="860.5" cy="310.5" rx="855.5" ry="305.5" />
            </g>

            <text
              x="51%"
              y="50%"
              font-size="215"
              font-family="Pretendard"
              fill="currentColor"
              stroke="currentColor"
              text-anchor="middle"
              dominant-baseline="middle"
              dy="0.35em"
            >
              마음 전하실 곳
            </text>
          </g>
        </svg>
      </div>

      <div class="account-section" id="accountSection"></div>
    </div>

    <!-- 공유 버튼 -->
    <div class="share-section">
      <button id="kakaoShare" class="kakao-btn" onclick="shareKakao()">
        카카오톡 공유하기
      </button>
      <button class="url-btn" onclick="copyUrl()">청첩장 주소 복사하기</button>
      <!-- <div class="footer"><p>ⓒweddingpeach</p></div> -->
    </div>

    <!-- 이미지 모달 -->
    <div class="lightbox-modal" id="lightboxModal">
      <div class="lightbox-head">
        <div class="lightbox-counter" id="lightboxCounter"></div>
        <button class="lightbox-close" id="lightboxClose" aria-label="닫기" />
      </div>

      <div class="lightbox-image-container">
        <div class="lightbox-loading" id="lightboxLoading"></div>
        <img class="lightbox-image" id="lightboxImage" src="" alt="" />

        <div class="lightbox-nav">
          <button class="lightbox-prev" id="lightboxPrev" aria-label="이전" />
          <button class="lightbox-next" id="lightboxNext" aria-label="다음" />
        </div>
      </div>

      <div class="lightbox-thumbnails" id="lightboxThumbnails"></div>
    </div>
  </body>

  <script type="text/javascript" src="/data.js"></script>
  <script type="text/javascript" src="/index.js"></script>
</html>
